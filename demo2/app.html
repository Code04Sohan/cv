<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wedding Accessories Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#b30000',      /* Traditional Red */
                        brandDark: '#8a0000',  /* Deep Red for hover */
                        gold: '#d4af37'        /* Premium Gold */
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased font-sans">
    
    <header class="bg-brand text-white py-8 px-4 text-center shadow-lg border-b-4 border-gold">
        <h1 class="text-4xl font-bold tracking-wider mb-2">Wedding PRO</h1>
        <p class="text-sm md:text-base font-light text-gold uppercase tracking-widest">Premium Bengali Wedding Accessories</p>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div id="cart-container" class="bg-white rounded-xl shadow-md border border-gray-200 p-6 mb-10 transition-all">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold text-gray-700">Your Cart (<span id="cart-count" class="text-brand">0</span>)</h3>
                <h4 class="text-lg font-bold text-gray-800">Total: <span class="text-brand">₹<span id="cart-total">0</span></span></h4>
            </div>
            <div id="cart-items" class="space-y-2 text-sm md:text-base"></div>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-l-4 border-brand pl-3">Our Catalog</h2>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <p class="col-span-full text-gray-500 animate-pulse">Loading premium products...</p>
        </div>

        <hr class="my-12 border-gray-300">

        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-l-4 border-brand pl-3">Checkout Details</h2>
        <form id="order-form" class="bg-white rounded-xl shadow-md border border-gray-200 p-6 md:p-8 flex flex-col gap-5 max-w-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="text" id="cust-name" placeholder="Full Name" required class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition">
                <input type="tel" id="cust-phone" placeholder="Phone Number" required class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition">
            </div>
            <input type="email" id="cust-email" placeholder="Email Address (For Receipt)" required class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition">
            <textarea id="cust-address" placeholder="Complete Delivery Address" rows="3" required class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition resize-none"></textarea>
            
            <button type="submit" id="checkout-btn" disabled class="mt-4 w-full bg-brand hover:bg-brandDark text-white font-bold py-4 rounded-lg shadow-lg transform transition hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                Place Secure Order
            </button>
        </form>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
